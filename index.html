<style>
  :root {
    --bg: #020617;
    --card: #0a1628;
    --border: #1e3a5f;
    --blue: #3b82f6;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #22c55e;
    --green-dim: #166534;
    --red: #ef4444;
    --red-dim: #7f1d1d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background:
      linear-gradient(rgba(2,6,23,0.9), rgba(2,6,23,0.95)),
      url("https://images.unsplash.com/photo-1587202372775-e229f172b9d7?q=80&w=1600&auto=format&fit=crop");
    background-size: cover;
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
  }

  /* subtle animated glow */
  body::after {
    content:'';
    position:fixed;
    inset:0;
    background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(34,197,94,0.1), transparent 40%);
    animation: pulseGlow 6s infinite alternate;
    pointer-events:none;
  }

  @keyframes pulseGlow {
    from { opacity:0.4; }
    to   { opacity:0.8; }
  }

  .container {
    max-width: 860px;
    margin: auto;
    padding: 20px 16px 60px;
  }

  .hero {
    text-align: center;
    padding: 60px 20px 30px;
  }

  .hero h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(22px, 5vw, 36px);
    color: var(--blue);
    text-shadow: 0 0 25px rgba(59,130,246,0.6);
  }

  .hero p {
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 3px;
  }

  .card {
    background: rgba(10,22,40,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-top: 24px;
    transition: 0.3s;
  }

  .card:hover {
    box-shadow: 0 0 30px rgba(59,130,246,0.2);
    transform: translateY(-2px);
  }

  .card h2 {
    font-family: 'Orbitron';
    color: #60a5fa;
    font-size: 15px;
    margin-bottom: 18px;
    border-left: 3px solid var(--blue);
    padding-left: 12px;
  }

  .item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    padding: 13px 0;
    border-bottom: 1px solid #0f2040;
  }

  .item-name { font-weight: 600; }

  .item-price {
    font-family: 'Orbitron';
    color: #93c5fd;
  }

  .btn-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    text-decoration: none;
    transition: 0.2s;
  }

  .btn-link:hover { transform: scale(1.05); }

  .btn-green {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid var(--green);
  }

  .btn-red {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid var(--red);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }

  .total {
    text-align: center;
    background: linear-gradient(90deg,#1d4ed8,#3b82f6);
    padding: 14px;
    border-radius: 10px;
    margin-top: 18px;
    font-family: 'Orbitron';
  }

  .footer {
    text-align:center;
    margin-top:30px;
    color:var(--muted);
  }

  @media(max-width:520px){
    .item { grid-template-columns:1fr; }
  }
</style>
