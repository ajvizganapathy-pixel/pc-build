<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dream Build • Architecture View</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=JetBrains+Mono:wght@400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050811;
  --card: #0c1426;
  --border: #1a2a4a;
  --line: rgba(120, 160, 220, 0.12);
  --text: #dbe4f4;
  --muted: #6c7a93;
  --green: #22c55e;
  --red: #ef4444;
}

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 20% 10%, rgba(59,130,246,0.18), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(244,63,94,0.12), transparent 40%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 880px;
  margin: auto;
  padding: 40px 16px 80px;
  position: relative;
  z-index: 1;
}

.hero { text-align: center; padding: 30px 10px 10px; }
.hero h1 {
  font-family: 'Orbitron', sans-serif;
  font-weight: 800;
  font-size: clamp(24px, 6vw, 42px);
  letter-spacing: 3px;
  background: linear-gradient(90deg, #60a5fa 0%, #f472b6 50%, #22d3ee 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 60px rgba(59,130,246,0.25);
}
.hero p {
  color: var(--muted);
  letter-spacing: 4px;
  text-transform: uppercase;
  font-size: 13px;
  margin-top: 8px;
}
.hero .badge {
  display: inline-block;
  margin-top: 14px;
  padding: 4px 14px;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #93c5fd;
  letter-spacing: 1px;
}

.stack {
  margin-top: 40px;
  position: relative;
}

.stack::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(59,130,246,0.6) 8%,
    rgba(244,63,94,0.6) 50%,
    rgba(34,197,94,0.6) 92%,
    transparent 100%);
  filter: blur(0.5px);
  box-shadow: 0 0 12px rgba(59,130,246,0.4);
  z-index: 0;
}

.stack::after {
  content: '';
  position: absolute;
  left: calc(50% - 4px);
  top: 0;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #60a5fa 50%, transparent 70%);
  box-shadow: 0 0 14px #60a5fa, 0 0 28px #3b82f6;
  animation: railPulse 5s linear infinite;
  z-index: 0;
}

@keyframes railPulse {
  0%   { top: -10px; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

.card {
  background: linear-gradient(180deg, var(--card) 0%, #070c18 100%);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 18px 20px;
  margin: 26px 0;
  position: relative;
  z-index: 1;
  box-shadow:
    0 0 0 1px rgba(59,130,246,0.05) inset,
    0 20px 40px rgba(0,0,0,0.4),
    0 0 60px rgba(59,130,246,0.05);
  animation: cardIn 0.8s ease backwards;
}
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.15s; }
.card:nth-child(3) { animation-delay: 0.25s; }
.card:nth-child(4) { animation-delay: 0.35s; }
.card:nth-child(5) { animation-delay: 0.45s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card::before, .card::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border: 1.5px solid #3b82f6;
  opacity: 0.6;
}
.card::before { top: -1px; left: -1px;  border-right: none; border-bottom: none; border-top-left-radius: 18px; }
.card::after  { bottom: -1px; right: -1px; border-left: none;  border-top: none;    border-bottom-right-radius: 18px; }

.cpu-svg {
  display: block;
  width: 100%;
  height: auto;
  color: rgba(140, 170, 220, 0.45);
}

.info {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px;
  padding-top: 14px;
  margin-top: 6px;
  border-top: 1px dashed rgba(120, 160, 220, 0.15);
}

.tag-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(59,130,246,0.12);
  color: #93c5fd;
  border: 1px solid rgba(59,130,246,0.3);
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.status-dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); animation: dotPulse 1.6s ease-in-out infinite; }
.status-dot.no { background: var(--red);   box-shadow: 0 0 8px var(--red); }

@keyframes dotPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.55; transform: scale(0.85); }
}

.name {
  font-weight: 700;
  font-size: 16px;
  color: #e8eefc;
  line-height: 1.2;
}

.price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #93c5fd;
  margin-top: 4px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-decoration: none;
  white-space: nowrap;
  border: 1px solid;
  transition: transform 0.15s, filter 0.2s, box-shadow 0.2s;
  cursor: pointer;
}
.btn:hover { transform: translateY(-1px); filter: brightness(1.2); }

.btn.ok {
  background: linear-gradient(180deg, rgba(34,197,94,0.18), rgba(34,197,94,0.06));
  color: #86efac;
  border-color: rgba(34,197,94,0.6);
  box-shadow: 0 0 14px rgba(34,197,94,0.18);
}
.btn.ok:hover { box-shadow: 0 0 22px rgba(34,197,94,0.45); }

.btn.no {
  background: linear-gradient(180deg, rgba(239,68,68,0.18), rgba(239,68,68,0.06));
  color: #fca5a5;
  border-color: rgba(239,68,68,0.6);
  cursor: not-allowed;
  opacity: 0.85;
}

.total-card {
  margin-top: 36px;
  padding: 22px;
  border-radius: 18px;
  text-align: center;
  background: linear-gradient(135deg, #1d4ed8 0%, #7c3aed 50%, #db2777 100%);
  font-family: 'Orbitron', sans-serif;
  font-weight: 800;
  letter-spacing: 2px;
  font-size: 18px;
  box-shadow: 0 10px 40px rgba(124,58,237,0.35), 0 0 80px rgba(59,130,246,0.2);
  position: relative;
  z-index: 1;
}
.total-card .label { font-size: 10px; opacity: 0.85; display: block; margin-bottom: 6px; letter-spacing: 4px; }

.footer {
  text-align: center;
  margin-top: 36px;
  color: var(--muted);
  font-size: 13px;
  letter-spacing: 1.5px;
}
.footer b { color: #93c5fd; }

/* ===== CPU ARCHITECTURE ANIMATIONS ===== */
.cpu-architecture {
  offset-anchor: 10px 0px;
  animation-name: animation-path;
  animation-iteration-count: infinite;
  animation-timing-function: cubic-bezier(0.75, -0.01, 0, 0.99);
}
.cpu-line-1 { offset-path: path("M 10 20 h 79.5 q 5 0 5 5 v 30"); animation-duration: 5s; animation-delay: 1s; }
.cpu-line-2 { offset-path: path("M 180 10 h -69.7 q -5 0 -5 5 v 40"); animation-duration: 2s; animation-delay: 6s; }
.cpu-line-3 { offset-path: path("M 130 20 v 21.8 q 0 5 -5 5 h -25"); animation-duration: 6s; animation-delay: 4s; }
.cpu-line-4 { offset-path: path("M 170 80 v -21.8 q 0 -5 -5 -5 h -65"); animation-duration: 3s; animation-delay: 3s; }
.cpu-line-5 { offset-path: path("M 135 65 h 15 q 5 0 5 5 v 10 q 0 5 -5 5 h -39.8 q -5 0 -5 -5 v -35"); animation-duration: 4s; animation-delay: 9s; }
.cpu-line-6 { offset-path: path("M 94.8 95 v -46"); animation-duration: 7s; animation-delay: 3s; }
.cpu-line-7 { offset-path: path("M 88 88 v -15 q 0 -5 -5 -5 h -10 q -5 0 -5 -5 v -5 q 0 -5 5 -5 h 28"); animation-duration: 4s; animation-delay: 4s; }
.cpu-line-8 { offset-path: path("M 30 30 h 25 q 5 0 5 5 v 6.5 q 0 5 5 5 h 35"); animation-duration: 3s; animation-delay: 3s; }

@keyframes animation-path {
  0%   { offset-distance: 0%; }
  100% { offset-distance: 100%; }
}

@media (max-width: 520px) {
  .info { grid-template-columns: 1fr; }
  .info .right { display: flex; justify-content: flex-end; }
  .stack::before { left: 14px; }
  .stack::after  { left: 10px; }
  .name { font-size: 15px; }
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>MY DREAM BUILD</h1>
    <p>High-End Workstation • No Compromise</p>
    <span class="badge">// ARCHITECTURE VIEW //</span>
  </div>

  <div class="stack" id="stack"></div>

  <div class="total-card">
    <span class="label">CORE TOTAL</span>
    ₹4,95,707
  </div>

  <div class="footer">
    Built by <b>Anjan Ganapathy</b> 🚀
  </div>

</div>

<script>
const components = [
  { code: "RAM",  name: "G.Skill Trident Z5 DDR5 64GB",       price: "₹88,400",   available: true,  link: "https://www.amazon.in/s?k=G.Skill+Trident+Z5+DDR5+64GB" },
  { code: "CPU",  name: "AMD Ryzen 9 9950X3D",                price: "₹79,000",   available: true,  link: "https://www.amazon.in/s?k=AMD+Ryzen+9+9950X3D" },
  { code: "MOBO", name: "Gigabyte X870E AORUS Elite WiFi7",   price: "₹33,999",   available: true,  link: "https://www.amazon.in/s?k=Gigabyte+X870E+AORUS+Elite+WiFi7" },
  { code: "SSD",  name: "Samsung 9100 Pro 8TB Gen5 NVMe",     price: "₹1,59,899", available: false, link: "#" },
  { code: "GPU",  name: "ZOTAC RTX 5070 Ti AMP Extreme",      price: "₹1,34,409", available: true,  link: "https://www.amazon.in/s?k=ZOTAC+RTX+5070+Ti+AMP+Extreme" }
];

function cpuSvg(p, label) {
  return `
  <svg class="cpu-svg" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
    <g stroke="currentColor" fill="none" stroke-width="0.3" stroke-dasharray="100 100" pathLength="100" marker-start="url(#${p}-marker)">
      <path stroke-dasharray="100 100" pathLength="100" d="M 10 20 h 79.5 q 5 0 5 5 v 30" />
      <path stroke-dasharray="100 100" pathLength="100" d="M 180 10 h -69.7 q -5 0 -5 5 v 30" />
      <path d="M 130 20 v 21.8 q 0 5 -5 5 h -10" />
      <path d="M 170 80 v -21.8 q 0 -5 -5 -5 h -50" />
      <path stroke-dasharray="100 100" pathLength="100" d="M 135 65 h 15 q 5 0 5 5 v 10 q 0 5 -5 5 h -39.8 q -5 0 -5 -5 v -20" />
      <path d="M 94.8 95 v -36" />
      <path d="M 88 88 v -15 q 0 -5 -5 -5 h -10 q -5 0 -5 -5 v -5 q 0 -5 5 -5 h 14" />
      <path d="M 30 30 h 25 q 5 0 5 5 v 6.5 q 0 5 5 5 h 20" />
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1s" fill="freeze"
               calcMode="spline" keySplines="0.25,0.1,0.5,1" keyTimes="0; 1" />
    </g>

    <g mask="url(#${p}-m1)"><circle class="cpu-architecture cpu-line-1" cx="0" cy="0" r="8" fill="url(#${p}-blue)" /></g>
    <g mask="url(#${p}-m2)"><circle class="cpu-architecture cpu-line-2" cx="0" cy="0" r="8" fill="url(#${p}-yellow)" /></g>
    <g mask="url(#${p}-m3)"><circle class="cpu-architecture cpu-line-3" cx="0" cy="0" r="8" fill="url(#${p}-pink)" /></g>
    <g mask="url(#${p}-m4)"><circle class="cpu-architecture cpu-line-4" cx="0" cy="0" r="8" fill="url(#${p}-white)" /></g>
    <g mask="url(#${p}-m5)"><circle class="cpu-architecture cpu-line-5" cx="0" cy="0" r="8" fill="url(#${p}-green)" /></g>
    <g mask="url(#${p}-m6)"><circle class="cpu-architecture cpu-line-6" cx="0" cy="0" r="8" fill="url(#${p}-orange)" /></g>
    <g mask="url(#${p}-m7)"><circle class="cpu-architecture cpu-line-7" cx="0" cy="0" r="8" fill="url(#${p}-cyan)" /></g>
    <g mask="url(#${p}-m8)"><circle class="cpu-architecture cpu-line-8" cx="0" cy="0" r="8" fill="url(#${p}-rose)" /></g>

    <g fill="url(#${p}-conn)">
      <rect x="93"  y="37" width="2.5" height="5" rx="0.7" />
      <rect x="104" y="37" width="2.5" height="5" rx="0.7" />
      <rect x="116.3" y="44" width="2.5" height="5" rx="0.7" transform="rotate(90 116.25 45.5)" />
      <rect x="122.8" y="44" width="2.5" height="5" rx="0.7" transform="rotate(90 116.25 45.5)" />
      <rect x="104" y="16" width="2.5" height="5" rx="0.7" transform="rotate(180 105.25 39.5)" />
      <rect x="114.5" y="16" width="2.5" height="5" rx="0.7" transform="rotate(180 105.25 39.5)" />
      <rect x="80" y="-13.6" width="2.5" height="5" rx="0.7" transform="rotate(270 115.25 19.5)" />
      <rect x="87" y="-13.6" width="2.5" height="5" rx="0.7" transform="rotate(270 115.25 19.5)" />
    </g>

    <rect x="85" y="40" width="30" height="20" rx="2" fill="#181818" filter="url(#${p}-shadow)" />
    <text x="100" y="53" font-size="6" font-weight="700" letter-spacing="0.5"
          text-anchor="middle" fill="url(#${p}-text)">${label}</text>

    <defs>
      <mask id="${p}-m1"><path d="M 10 20 h 79.5 q 5 0 5 5 v 24" stroke-width="0.5" stroke="white" /></mask>
      <mask id="${p}-m2"><path d="M 180 10 h -69.7 q -5 0 -5 5 v 24" stroke-width="0.5" stroke="white" /></mask>
      <mask id="${p}-m3"><path d="M 130 20 v 21.8 q 0 5 -5 5 h -10" stroke-width="0.5" stroke="white" /></mask>
      <mask id="${p}-m4"><path d="M 170 80 v -21.8 q 0 -5 -5 -5 h -50" stroke-width="0.5" stroke="white" /></mask>
      <mask id="${p}-m5"><path d="M 135 65 h 15 q 5 0 5 5 v 10 q 0 5 -5 5 h -39.8 q -5 0 -5 -5 v -20" stroke-width="0.5" stroke="white" /></mask>
      <mask id="${p}-m6"><path d="M 94.8 95 v -36" stroke-width="0.5" stroke="white" /></mask>
      <mask id="${p}-m7"><path d="M 88 88 v -15 q 0 -5 -5 -5 h -10 q -5 0 -5 -5 v -5 q 0 -5 5 -5 h 14" stroke-width="0.5" stroke="white" /></mask>
      <mask id="${p}-m8"><path d="M 30 30 h 25 q 5 0 5 5 v 6.5 q 0 5 5 5 h 20" stroke-width="0.5" stroke="white" /></mask>

      <radialGradient id="${p}-blue"   fx="1"><stop offset="0%" stop-color="#00E8ED"/><stop offset="50%" stop-color="#08F"/><stop offset="100%" stop-color="transparent"/></radialGradient>
      <radialGradient id="${p}-yellow" fx="1"><stop offset="0%" stop-color="#FFD800"/><stop offset="50%" stop-color="#FFD800"/><stop offset="100%" stop-color="transparent"/></radialGradient>
      <radialGradient id="${p}-pink"   fx="1"><stop offset="0%" stop-color="#830CD1"/><stop offset="50%" stop-color="#FF008B"/><stop offset="100%" stop-color="transparent"/></radialGradient>
      <radialGradient id="${p}-white"  fx="1"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="transparent"/></radialGradient>
      <radialGradient id="${p}-green"  fx="1"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="transparent"/></radialGradient>
      <radialGradient id="${p}-orange" fx="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="transparent"/></radialGradient>
      <radialGradient id="${p}-cyan"   fx="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="transparent"/></radialGradient>
      <radialGradient id="${p}-rose"   fx="1"><stop offset="0%" stop-color="#f43f5e"/><stop offset="100%" stop-color="transparent"/></radialGradient>

      <filter id="${p}-shadow" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="1.5" dy="1.5" stdDeviation="1" flood-color="black" flood-opacity="0.1"/>
      </filter>

      <marker id="${p}-marker" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="14" markerHeight="14">
        <circle cx="5" cy="5" r="2" fill="black" stroke="#232323" stroke-width="0.5">
          <animate attributeName="r" values="0; 3; 2" dur="0.5s"/>
        </circle>
      </marker>

      <linearGradient id="${p}-conn" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4F4F4F"/><stop offset="60%" stop-color="#121214"/>
      </linearGradient>

      <linearGradient id="${p}-text" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#666">
          <animate attributeName="offset" values="-2;-1;0" dur="5s" repeatCount="indefinite"
                   calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
        </stop>
        <stop offset="25%" stop-color="white">
          <animate attributeName="offset" values="-1;0;1" dur="5s" repeatCount="indefinite"
                   calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
        </stop>
        <stop offset="50%" stop-color="#666">
          <animate attributeName="offset" values="0;1;2" dur="5s" repeatCount="indefinite"
                   calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
        </stop>
      </linearGradient>
    </defs>
  </svg>`;
}

function makeCard(c, idx) {
  const prefix = `cpu-${idx}`;
  const statusClass = c.available ? 'ok' : 'no';
  const btn = c.available
    ? `<a class="btn ok" href="${c.link}" target="_blank" rel="noopener">
         <span class="status-dot ok"></span> Find Link
       </a>`
    : `<span class="btn no">
         <span class="status-dot no"></span> Unavailable
       </span>`;

  return `
  <div class="card">
    ${cpuSvg(prefix, c.code)}
    <div class="info">
      <div class="left">
        <div class="tag-row">
          <span class="tag">[${c.code}]</span>
          <span class="status-dot ${statusClass}"></span>
        </div>
        <div class="name">${c.name}</div>
        <div class="price">${c.price}</div>
      </div>
      <div class="right">${btn}</div>
    </div>
  </div>`;
}

document.getElementById('stack').innerHTML = components.map(makeCard).join('');
</script>

</body>
</html>
